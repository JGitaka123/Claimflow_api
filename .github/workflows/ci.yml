name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-phi:
    name: No-PHI Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Scan tests / fixtures / seeds for real-PHI patterns
        run: bash scripts/check-no-phi.sh

  typecheck-and-tests:
    name: Typecheck + Workspace Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run workspace tests
        run: pnpm test

  sdk-drift:
    name: SDK Drift + No-Internals
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install codegen + SDK Python deps
        # datamodel-code-generator is pinned so the regenerate-and-diff drift
        # check is reproducible (with --formatters builtin, no black/isort vars).
        run: pip install "datamodel-code-generator==0.61.0" "pydantic[email]>=2.6" requests pytest

      - name: Regenerate SDKs/docs and assert no drift from openapi.yaml
        run: bash scripts/generate-sdks.sh --check

      - name: No-internals + client tests (Node SDK)
        run: pnpm --filter @claimflow/sdk-node test

      - name: Python SDK tests
        # `python -m pytest` (not the bare console script) so it uses the
        # setup-python interpreter that has the deps, and puts the package dir on
        # sys.path for `import claimflow`.
        run: cd sdks/python && python -m pytest -q

  api-integration:
    name: API Integration (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: claimflow
          POSTGRES_USER: claimflow
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claimflow -d claimflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API integration tests
        env:
          CLAIMFLOW_TEST_DATABASE_URL: postgres://claimflow:dev@127.0.0.1:5432/claimflow
        run: pnpm --filter @claimflow/api test:integration

  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @claimflow/web exec playwright install --with-deps chromium

      - name: Run web e2e suite
        env:
          PLAYWRIGHT_WEB_PORT: '3215'
        run: pnpm --filter @claimflow/web test:e2e
