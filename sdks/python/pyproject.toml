[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "claimflow"
version = "1.0.0"
description = "Python client for the ClaimFlow API (models generated from openapi.yaml)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "UNLICENSED" }
dependencies = [
  "requests>=2.31",
  "pydantic[email]>=2.6",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "datamodel-code-generator>=0.25",
]

[tool.setuptools]
packages = ["claimflow"]
